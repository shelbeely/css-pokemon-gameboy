<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>Pokédex — Pokémon Crystal</title>
  <meta name="description"
        content="Complete Gen 1 &amp; 2 Pokédex with Crystal sprites, built with the Pokémon GameBoy CSS framework.">

  <link rel="apple-touch-icon" sizes="180x180" href="src/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon-16x16.png">
  <link rel="manifest" href="src/site.webmanifest">

  <style>
    body { padding: 0; }

    #pokedex-content {
      padding: 1em 2em 3em;
      max-width: 1200px;
      margin: 0 auto;
    }

    #type-filter { margin: 1em 0 0.5em; flex-wrap: wrap; }

    #pokedex-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 0.65em;
      margin-top: 0.75em;
    }

    #pokedex-grid .card { cursor: default; }
    #pokedex-grid .card-image { padding: 0.5em; min-height: 64px; display: flex; align-items: center; justify-content: center; }
    #pokedex-grid .card-image img { max-width: 56px; max-height: 56px; }
    #pokedex-grid .card-body { padding: 0.35em 0.5em 0.5em; }
    #pokedex-grid .card-subtitle { font-size: 0.6em; margin-bottom: 0.25em; }
    #pokedex-grid .card-title { font-size: 0.5em; margin-bottom: 0.35em; }
    #pokedex-grid .type-badge { font-size: 0.5em; }

    #no-results { display: none; text-align: center; margin-top: 2em; }
    #no-results.visible { display: block; }

    .app-bar-search {
      font-family: var(--pgb-font-content, monospace);
      font-size: 0.6em;
      width: 10em;
      padding: 0.3em 0.5em;
      background: var(--pgb-color-neutral);
      color: var(--pgb-color-contrast);
      border: 2px solid var(--pgb-color-neutral);
      outline: none;
    }

    .app-bar-search:focus {
      border-color: var(--pgb-color-primary);
    }

    @media screen and (max-width: 480px) {
      #pokedex-content { padding: 0.75em 0.75em 2em; }
      .app-bar-search { width: 7em; }
    }
  </style>
</head>

<body>
  <header class="app-bar">
    <a href="index.html" class="app-bar-nav" title="Back to demo">◀</a>
    <span class="app-bar-title">POKÉDEX</span>
    <div class="app-bar-actions">
      <input type="search" id="pokedex-search" class="app-bar-search"
             placeholder="Name or #…" autocomplete="off" aria-label="Search Pokémon">
    </div>
  </header>

  <div id="pokedex-content">
    <div class="chip-group" id="type-filter" role="group" aria-label="Filter by type"></div>
    <p id="no-results">No Pokémon found.</p>
    <div id="pokedex-grid" aria-live="polite"></div>
  </div>

    const ALL_TYPES = [
      "normal","fire","water","electric","grass","ice",
      "fighting","poison","ground","flying","psychic","bug",
      "rock","ghost","dragon","dark","steel"
    ];

    // ── State ──────────────────────────────────────────────────────────────────
    let activeType = "";
    let searchQuery = "";

    // ── Build type filter chips ────────────────────────────────────────────────
    const filterEl = document.getElementById("type-filter");

    const allChip = document.createElement("button");
    allChip.className = "chip filter selected";
    allChip.textContent = "All";
    allChip.dataset.type = "";
    filterEl.appendChild(allChip);

    for (const t of ALL_TYPES) {
      const btn = document.createElement("button");
      btn.className = "chip filter";
      btn.dataset.type = t;
      btn.innerHTML = `<span class="type-badge ${t}">${t.charAt(0).toUpperCase() + t.slice(1)}</span>`;
      filterEl.appendChild(btn);
    }

    filterEl.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-type]");
      if (!btn) return;
      activeType = btn.dataset.type;
      filterEl.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      renderGrid();
    });

    // ── Search ─────────────────────────────────────────────────────────────────
    document.getElementById("pokedex-search").addEventListener("input", (e) => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderGrid();
    });

    // ── Render grid ────────────────────────────────────────────────────────────
    function pad(n) { return String(n).padStart(3, "0"); }

    function renderGrid() {
      const grid = document.getElementById("pokedex-grid");
      const noResults = document.getElementById("no-results");
      const q = searchQuery;
      let count = 0;

      grid.innerHTML = "";

      for (const [id, name, types] of POKEMON) {
        const num = pad(id);

        if (activeType && !types.includes(activeType)) continue;
        if (q && !name.toLowerCase().includes(q) && !num.includes(q) && !String(id).includes(q)) continue;

        count++;
        const typeBadges = types.map(t => `<span class="type-badge ${t}">${t}</span>`).join(" ");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          `<div class="card-image">` +
            `<img src="crystal_sprites/pokemon/front/${id}.png" alt="${name}" width="56" height="56">` +
          `</div>` +
          `<div class="card-body">` +
            `<p class="card-subtitle">#${num}</p>` +
            `<h3 class="card-title">${name}</h3>` +
            `<p style="margin:0">${typeBadges}</p>` +
          `</div>`;

        grid.appendChild(card);
      }

      noResults.classList.toggle("visible", count === 0);
    }

    // Initial render
    renderGrid();
  </script>
