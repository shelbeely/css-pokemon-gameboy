<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>Pokédex — Pokémon Crystal</title>
  <meta name="description"
        content="Complete Gen 1 &amp; 2 Pokédex with Crystal sprites, built with the Pokémon GameBoy CSS framework.">

  <link rel="apple-touch-icon" sizes="180x180" href="src/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon-16x16.png">
  <link rel="manifest" href="src/site.webmanifest">

  <style>
    body { padding: 0; margin: 0; }

    /* ── App layout ──────────────────────────────────────────────────────── */
    #pokedex-app {
      display: flex;
      height: calc(100dvh - 4rem);
      overflow: hidden;
    }

    /* ── Left panel ──────────────────────────────────────────────────────── */
    #list-panel {
      display: flex;
      flex-direction: column;
      width: 260px;
      min-width: 220px;
      max-width: 260px;
      flex-shrink: 0;
      background: var(--pgb-color-contrast);
      color: var(--pgb-color-neutral);
      overflow: hidden;
    }

    /* Type filter strip */
    #type-filter-strip {
      overflow-x: auto;
      white-space: nowrap;
      flex-shrink: 0;
      padding: 0.35em 0.5em;
      border-bottom: 2px solid rgba(128,128,128,0.35);
      scrollbar-width: none;
    }
    #type-filter-strip::-webkit-scrollbar { display: none; }

    #type-filter-strip button {
      display: inline-block;
      font-family: var(--pgb-font-content, monospace);
      font-size: 0.5em;
      padding: 0.2em 0.5em;
      margin-right: 0.4em;
      background: transparent;
      color: var(--pgb-color-neutral);
      border: 1px solid rgba(128,128,128,0.5);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    #type-filter-strip button.active {
      background: var(--pgb-color-neutral);
      color: var(--pgb-color-contrast);
    }

    /* Preview thumbnail */
    #list-preview {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5em 0.4em 0.4em;
      background: rgba(128,128,128,0.18);
      border-bottom: 2px solid rgba(128,128,128,0.35);
      min-height: 70px;
    }
    #list-preview img {
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
      object-fit: contain;
    }
    #list-preview-label {
      font-family: var(--pgb-font-content, monospace);
      font-size: 0.45em;
      text-transform: uppercase;
      color: var(--pgb-color-neutral);
      margin-top: 0.3em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* Scrollable list */
    #pokemon-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(128,128,128,0.4) transparent;
    }

    .list-row {
      display: flex;
      align-items: center;
      font-family: var(--pgb-font-content, monospace);
      font-size: 0.6em;
      text-transform: uppercase;
      padding: 0.4em 0.75em;
      cursor: pointer;
      white-space: nowrap;
      color: var(--pgb-color-neutral);
      user-select: none;
    }
    .list-row:hover {
      background: rgba(128,128,128,0.2);
    }
    .list-row.active {
      background: var(--pgb-color-neutral);
      color: var(--pgb-color-contrast);
    }
    .list-row .cursor {
      display: inline-block;
      width: 1em;
      visibility: hidden;
      flex-shrink: 0;
    }
    .list-row.active .cursor {
      visibility: visible;
    }
    .list-row .row-num {
      display: inline-block;
      width: 2.5em;
      flex-shrink: 0;
      opacity: 0.75;
    }
    .list-row.active .row-num {
      opacity: 1;
    }
    .list-row .row-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Right panel ─────────────────────────────────────────────────────── */
    #detail-panel {
      flex: 1;
      background: var(--pgb-color-neutral);
      color: var(--pgb-color-contrast);
      overflow-y: auto;
      font-family: var(--pgb-font-content, monospace);
    }

    #detail-inner {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    /* Entry header */
    #detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--pgb-color-contrast);
      color: var(--pgb-color-neutral);
      padding: 0.5em 0.75em;
      font-size: 0.6em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* Sprite + types grid */
    #detail-sprite-area {
      display: grid;
      grid-template-columns: 120px 1fr;
      flex-shrink: 0;
      border-bottom: 2px solid var(--pgb-color-contrast);
    }

    #detail-sprites {
      display: flex;
      flex-direction: column;
      align-items: center;
      border-right: 2px solid var(--pgb-color-contrast);
      background: rgba(128,128,128,0.07);
    }

    #detail-front {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      object-fit: contain;
      border-bottom: 2px solid var(--pgb-color-contrast);
      padding: 4px;
    }

    #detail-back {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      object-fit: contain;
      padding: 4px;
    }

    #detail-types {
      display: flex;
      flex-direction: column;
      gap: 0.5em;
      padding: 0.75em 0.5em;
    }

    /* Info row */
    #detail-info {
      font-size: 0.55em;
      text-transform: uppercase;
      padding: 0.5em 0.75em;
      border-bottom: 2px solid var(--pgb-color-contrast);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4em;
    }

    #detail-ht-wt {
      display: flex;
      gap: 1.5em;
    }

    /* Flavor text */
    #detail-flavor {
      font-size: 0.6em;
      text-transform: uppercase;
      padding: 0.75em;
      line-height: 1.8;
    }

    /* Evolution path */
    #detail-evolution {
      font-size: 0.55em;
      text-transform: uppercase;
      padding: 0.5em 0.75em 0.75em;
      border-top: 2px solid var(--pgb-color-contrast);
      flex: 1;
    }
    .evo-label {
      font-family: var(--pgb-font-content, monospace);
      margin-bottom: 0.5em;
      opacity: 0.7;
    }
    .evo-chain {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5em;
    }
    .evo-stage {
      display: flex;
      flex-direction: row;
      gap: 0.5em;
    }
    .evo-mon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15em;
      cursor: pointer;
      padding: 0.2em 0.3em;
    }
    .evo-mon:hover { background: rgba(128,128,128,0.15); }
    .evo-mon.evo-active {
      background: rgba(128,128,128,0.25);
      outline: 2px solid var(--pgb-color-contrast);
    }
    .evo-mon img {
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
      object-fit: contain;
    }
    .evo-mon span {
      font-family: var(--pgb-font-content, monospace);
      font-size: 0.7em;
      text-align: center;
    }
    .evo-arrow {
      font-family: var(--pgb-font-content, monospace);
      font-size: 1.2em;
      flex-shrink: 0;
      align-self: center;
    }

    /* Search input */
    .app-bar-search {
      font-family: var(--pgb-font-content, monospace);
      font-size: 0.6em;
      width: 9em;
      padding: 0.3em 0.5em;
      background: var(--pgb-color-neutral);
      color: var(--pgb-color-contrast);
      border: 2px solid var(--pgb-color-neutral);
      outline: none;
    }
    .app-bar-search:focus {
      border-color: var(--pgb-color-primary);
    }

    /* Back button (hidden on desktop) */
    #back-btn { display: none; }

    /* ── Mobile layout ───────────────────────────────────────────────────── */
    @media screen and (max-width: 768px) {
      #pokedex-app {
        height: calc(100dvh - 4rem);
        position: relative;
      }

      #list-panel {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 2;
        transition: transform 0.2s ease;
      }

      #detail-panel {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 1;
        transform: translateX(100%);
        transition: transform 0.2s ease;
      }

      #pokedex-app.detail-view #list-panel {
        transform: translateX(-100%);
      }

      #pokedex-app.detail-view #detail-panel {
        transform: translateX(0);
        z-index: 3;
      }

      #back-btn { display: inline-flex; }

      .app-bar-search { width: 7em; }
    }
  </style>
</head>

<body>
  <header class="app-bar">
    <button id="back-btn" class="app-bar-nav" aria-label="Back to list">◀</button>
    <a href="index.html" class="app-bar-nav" id="home-link" title="Back to demo">◀</a>
    <span class="app-bar-title">POKÉDEX</span>
    <div class="app-bar-actions">
      <input type="search" id="pokedex-search" class="app-bar-search"
             placeholder="Name or #…" autocomplete="off" aria-label="Search Pokémon">
    </div>
  </header>

  <div id="pokedex-app">
    <!-- Left panel: type filter + preview + list -->
    <div id="list-panel" tabindex="0" aria-label="Pokémon list">
      <div id="type-filter-strip" role="group" aria-label="Filter by type"></div>
      <div id="list-preview">
        <img id="preview-img" src="" alt="" width="40" height="40">
        <div id="list-preview-label"></div>
      </div>
      <div id="pokemon-list" role="listbox" aria-label="Pokémon"></div>
    </div>

    <!-- Right panel: Pokédex entry detail -->
    <div id="detail-panel" aria-live="polite">
      <div id="detail-inner">
        <div id="detail-header">
          <span id="detail-num"></span>
          <span id="detail-name"></span>
        </div>
        <div id="detail-sprite-area">
          <div id="detail-sprites">
            <img id="detail-front" src="" alt="" width="96" height="96">
            <img id="detail-back" src="" alt="" width="64" height="64">
          </div>
          <div id="detail-types"></div>
        </div>
        <div id="detail-info">
          <div id="detail-species"></div>
          <div id="detail-ht-wt">
            <span id="detail-ht"></span>
            <span id="detail-wt"></span>
          </div>
        </div>
        <div id="detail-flavor"></div>
        <div id="detail-evolution"></div>
      </div>
    </div>
  </div>

    ];

    // ── Utilities ──────────────────────────────────────────────────────────────
    function pad(n, len) { return String(n).padStart(len || 3, "0"); }

    const HG_PER_LB = 4.536;

    function dmToFtIn(decimeters) {
      const totalIn = Math.round(decimeters * 3.937);
      return `${Math.floor(totalIn / 12)}\'${String(totalIn % 12).padStart(2,"0")}"`;
    }

    function hgToLbs(hectograms) {
      return (hectograms / HG_PER_LB).toFixed(1) + "lb";
    }

    // ── State ──────────────────────────────────────────────────────────────────
    let selectedIdx = 0;   // index into POKEMON
    let activeType  = "";
    let searchQuery = "";

    // Visible rows (indices into POKEMON, updated on filter/search)
    let visibleIndices = [];

    // ── Build type filter chips ────────────────────────────────────────────────
    const typeStrip = document.getElementById("type-filter-strip");

    function makeFilterBtn(label, type) {
      const btn = document.createElement("button");
      btn.textContent = label;
      btn.dataset.type = type;
      if (type === "") btn.classList.add("active");
      btn.addEventListener("click", () => {
        activeType = type;
        typeStrip.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.type === type));
        renderList();
      });
      return btn;
    }

    typeStrip.appendChild(makeFilterBtn("ALL", ""));
    for (const t of ALL_TYPES) {
      typeStrip.appendChild(makeFilterBtn(t.toUpperCase(), t));
    }

    // ── Search ─────────────────────────────────────────────────────────────────
    document.getElementById("pokedex-search").addEventListener("input", (e) => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderList();
    });

    // ── Render list ────────────────────────────────────────────────────────────
    const listEl = document.getElementById("pokemon-list");

    function renderList() {
      listEl.innerHTML = "";
      visibleIndices = [];

      for (let i = 0; i < POKEMON.length; i++) {
        const [id, name, types] = POKEMON[i];
        const num = pad(id);
        if (activeType && !types.includes(activeType)) continue;
        if (searchQuery &&
            !name.toLowerCase().includes(searchQuery) &&
            !num.includes(searchQuery) &&
            !String(id).includes(searchQuery)) continue;
        visibleIndices.push(i);
      }

      for (const i of visibleIndices) {
        const [id, name, /* types */] = POKEMON[i];
        const row = document.createElement("div");
        row.className = "list-row" + (i === selectedIdx ? " active" : "");
        row.setAttribute("role", "option");
        row.setAttribute("aria-selected", i === selectedIdx ? "true" : "false");
        row.dataset.idx = i;
        row.innerHTML =
          `<span class="cursor">&#9658;</span>` +
          `<span class="row-num">${pad(id)}</span>` +
          `<span class="row-name">${name.toUpperCase()}</span>`;
        row.addEventListener("click", () => selectPokemon(i));
        listEl.appendChild(row);
      }

      // If selectedIdx is no longer visible, select first visible
      if (visibleIndices.length > 0 && !visibleIndices.includes(selectedIdx)) {
        selectPokemon(visibleIndices[0], true);
      } else {
        scrollActiveIntoView();
      }
    }

    // ── Select a Pokémon ───────────────────────────────────────────────────────
    function selectPokemon(idx, skipMobileTransition) {
      selectedIdx = idx;

      // Update list row highlighting
      listEl.querySelectorAll(".list-row").forEach(row => {
        const isActive = parseInt(row.dataset.idx) === idx;
        row.classList.toggle("active", isActive);
        row.setAttribute("aria-selected", isActive ? "true" : "false");
      });

      scrollActiveIntoView();
      renderDetail(idx);
      updatePreview(idx);

      if (!skipMobileTransition) {
        document.getElementById("pokedex-app").classList.add("detail-view");
      }
    }

    function scrollActiveIntoView() {
      const activeRow = listEl.querySelector(".list-row.active");
      if (activeRow) activeRow.scrollIntoView({ block: "nearest" });
    }

    // ── Sprite URL helpers (PokeAPI Crystal Gen-II) ────────────────────────────
    const SPRITE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-ii/crystal';
    function spriteUrl(id)     { return `${SPRITE_BASE}/${id}.png`; }
    function backSpriteUrl(id) { return `${SPRITE_BASE}/back/${id}.png`; }

    // ── Update left panel preview ──────────────────────────────────────────────
    function updatePreview(idx) {
      const [id, name] = POKEMON[idx];
      const img = document.getElementById("preview-img");
      img.src = spriteUrl(id);
      img.alt = name;
      document.getElementById("list-preview-label").textContent = `No.${pad(id)} ${name.toUpperCase()}`;
    }

    // ── Render detail panel ────────────────────────────────────────────────────
    function renderDetail(idx) {
      const [id, name, types] = POKEMON[idx];
      const pk = PKDATA[idx];

      document.getElementById("detail-num").textContent  = `No.${pad(id)}`;
      document.getElementById("detail-name").textContent = name.toUpperCase();

      const front = document.getElementById("detail-front");
      front.src = spriteUrl(id);
      front.alt = name;

      const back = document.getElementById("detail-back");
      back.src = backSpriteUrl(id);
      back.alt = `${name} back`;

      document.getElementById("detail-types").innerHTML =
        types.map(t => `<span class="type-badge ${t}">${t.toUpperCase()}</span>`).join("");

      if (pk) {
        document.getElementById("detail-species").textContent = pk[2].toUpperCase();
        document.getElementById("detail-ht").textContent = `HT  ${dmToFtIn(pk[0])}`;
        document.getElementById("detail-wt").textContent = `WT  ${hgToLbs(pk[1])}`;
        document.getElementById("detail-flavor").textContent = pk[3].toUpperCase();
      }

      // Async: fetch & render evolution chain
      document.getElementById("detail-evolution").innerHTML = '';
      _currentEvoId = id;
      getEvolutionChain(id).then(stages => {
        if (_currentEvoId === id) renderEvolution(stages, id);
      });
    }

    // ── Evolution chain ────────────────────────────────────────────────────────
    let _currentEvoId = 0;
    const P = new Pokedex();

    async function getEvolutionChain(pokemonId) {
      try {
        const species = await P.getPokemonSpeciesByName(pokemonId);
        const chainId = parseInt(species.evolution_chain.url.split('/').filter(Boolean).pop());
        const chainData = await P.getEvolutionChainById(chainId);
        return parseEvoStages(chainData.chain);
      } catch (e) { console.error('PokeAPI evolution chain fetch failed', e); return null; }
    }

    function parseEvoStages(node, stages = [], depth = 0) {
      const id = parseInt(node.species.url.split('/').filter(Boolean).pop());
      if (!stages[depth]) stages[depth] = [];
      stages[depth].push(id);
      for (const next of node.evolves_to) parseEvoStages(next, stages, depth + 1);
      return stages;
    }

    function renderEvolution(stages, currentId) {
      const el = document.getElementById('detail-evolution');
      if (!stages || stages.length <= 1) { el.innerHTML = ''; return; }
      let html = '<div class="evo-label">EVOLUTION PATH</div><div class="evo-chain">';
      for (let i = 0; i < stages.length; i++) {
        if (i > 0) html += '<span class="evo-arrow">▶</span>';
        html += '<div class="evo-stage">';
        for (const sid of stages[i]) {
          const entry = POKEMON.find(p => p[0] === sid);
          const sname = entry ? entry[1] : '';
          const active = sid === currentId ? ' evo-active' : '';
          html += `<div class="evo-mon${active}" data-id="${sid}">` +
            `<img src="${spriteUrl(sid)}" alt="${sname}" width="40" height="40">` +
            `<span>${sname.toUpperCase()}</span></div>`;
        }
        html += '</div>';
      }
      html += '</div>';
      el.innerHTML = html;
      el.querySelectorAll('.evo-mon').forEach(mon => {
        mon.addEventListener('click', () => {
          const idx = POKEMON.findIndex(p => p[0] === parseInt(mon.dataset.id));
          if (idx !== -1) selectPokemon(idx);
        });
      });
    }

    // ── Keyboard navigation on list panel ─────────────────────────────────────
    document.getElementById("list-panel").addEventListener("keydown", (e) => {
      if (!visibleIndices.length) return;
      const pos = visibleIndices.indexOf(selectedIdx);
      if (e.key === "ArrowDown") {
        e.preventDefault();
        const next = pos < visibleIndices.length - 1 ? visibleIndices[pos + 1] : visibleIndices[0];
        selectPokemon(next, true);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        const prev = pos > 0 ? visibleIndices[pos - 1] : visibleIndices[visibleIndices.length - 1];
        selectPokemon(prev, true);
      } else if (e.key === "Enter") {
        document.getElementById("pokedex-app").classList.add("detail-view");
      }
    });

    // ── Back button (mobile) ───────────────────────────────────────────────────
    document.getElementById("back-btn").addEventListener("click", () => {
      document.getElementById("pokedex-app").classList.remove("detail-view");
    });

    // ── Manage back/home button visibility on mobile ───────────────────────────
    const backBtn  = document.getElementById("back-btn");
    const homeLink = document.getElementById("home-link");

    // Keep in sync with @media (max-width: 768px) in <style>
    const MOBILE_BREAKPOINT = 768;

    function updateAppBar() {
      const isMobile = window.innerWidth <= MOBILE_BREAKPOINT;
      const isDetail = document.getElementById("pokedex-app").classList.contains("detail-view");
      backBtn.style.display  = (isMobile && isDetail) ? "" : "none";
      homeLink.style.display = (isMobile && isDetail) ? "none" : "";
    }

    const appEl = document.getElementById("pokedex-app");
    const observer = new MutationObserver(updateAppBar);
    observer.observe(appEl, { attributes: true, attributeFilter: ["class"] });
    window.addEventListener("resize", updateAppBar);
    window.addEventListener("pagehide", () => observer.disconnect(), { once: true });

    // ── Init ───────────────────────────────────────────────────────────────────
    renderList();
    updatePreview(0);
    renderDetail(0);
    updateAppBar();
  </script>
</body>

</html>
